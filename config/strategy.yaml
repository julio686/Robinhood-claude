# strategy.yaml — strategy parameters. Source of truth for the live loop.
# Two strategies are implemented; `active` selects which one the live machine runs.
#   momentum -> toolkit/strategy.mjs      (buy breakouts near 52wk highs)
#   dip      -> toolkit/dip_strategy.mjs  (buy RSI(2) pullbacks inside an uptrend)
# Backtests favor `dip` (better win rate + return as an active strategy), so it is the default.
active: dip

# --- Dip Buyer params (mirror DIP_CFG in toolkit/dip_strategy.mjs) ---
dip:
  sma_trend: 200                 # long-term uptrend gate (price must be above)
  ema_fast: 50
  ema_slow: 200
  rsi_short: 2                   # Connors RSI(2)
  rsi_long: 14
  atr_period: 14
  sma5: 5
  entry:
    rsi2_max: 10                 # buy when RSI(2) < this (sharp oversold dip)
    ema50_tolerance_pct: 0.03    # reject if >3% below 50-EMA (breakdown, not a dip)
    no_earnings_within_days: 3
  exit:                          # the "seller" — professional sell discipline
    atr_stop_mult: 2.0           # initial stop = entry - 2*ATR
    breakeven_r: 1.0             # once +1R, stop -> breakeven (anti round-trip)
    chandelier_lookback: 10      # trailing stop lookback
    chandelier_mult: 2.5         # trail = highHigh(10) - 2.5*ATR
    exit_rsi2: 65                # sell into strength when RSI(2) > this
    time_stop_bars: 5            # mean reversion works fast or not at all

name: momentum_hunter
description: >
  Hunt the technical fingerprint explosive names share BEFORE a run: price breaking
  toward new highs, in an intact uptrend, on a volume surge, with strong-but-not-blowoff
  momentum. Ranks candidates by setup strength. This reads the PRESENT, it does not
  forecast the future.

indicators:
  trend_fast_period: 50          # EMA
  trend_slow_period: 200         # EMA
  rsi_period: 14
  atr_period: 14
  high_lookback: 252             # ~1 trading year trailing high (breakout reference)
  vol_avg_period: 20

entry:                           # ALL must be true
  max_pct_below_high: 0.05       # within 5% of trailing high (breakout zone)
  uptrend_stack: true            # price > 50EMA AND 50EMA > 200EMA
  min_volume_mult: 1.5           # today's volume >= 1.5x 20-day average
  rsi_min: 50                    # strong...
  rsi_max: 80                    # ...but not blow-off / overbought-exhausted
  falling_knife_pct_below_high: 0.5  # reject names too far below high (the PLTR-today screen-out)
  no_earnings_within_days: 3

exit:
  atr_stop_mult: 2.0             # initial stop = entry - 2.0 * ATR(14)
  atr_trail_mult: 2.0            # trail the stop up by 2.0 * ATR (never down)
  take_profit_r: 2.0             # scale out at +2R
  exit_below_50ema: true         # hard exit if close back under the 50-day EMA
  time_stop_bars: 10             # exit if it hasn't worked within ~10 sessions

ranking:
  # composite score weights (see evaluateEntry in strategy.mjs)
  relative_strength_weight: 0.5
  volume_weight: 0.3
  trend_weight: 0.2
